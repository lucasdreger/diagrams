name: Convert .drawio to HTML

on:
  push:
    paths:
      - '**/*.drawio'
  pull_request:
    paths:
      - '**/*.drawio'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Convert .drawio to HTML
        run: |
          for file in $(find . -name '*.drawio'); do
            filename=$(basename "$file" .drawio)
            npx puppeteer-core html_files/$filename.html <<-EOF
              const fs = require('fs');
              const puppeteer = require('puppeteer-core');

              (async () => {
                const browser = await puppeteer.launch();
                const page = await browser.newPage();
                const content = fs.readFileSync('$file', 'utf8');
                await page.setContent(content);
                await page.evaluate(() => {
                  // Add any required JavaScript here
                });
                await page.screenshot({ path: 'html_files/' + '$filename' + '.png' });
                await browser.close();
              })();
EOF
          done

      - name: Commit HTML files
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add html_files/*.html
          git commit -m 'Automated conversion of .drawio files to HTML' || echo "No changes to commit"
          git push
