name: Convert Drawio to HTML

on:
  push:
    paths:
      - '**/*.drawio'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install draw.io Desktop (headless)
        run: |
          wget https://github.com/jgraph/drawio-desktop/releases/download/v21.6.8/drawio-x86_64-21.6.8.AppImage
          chmod +x drawio-x86_64-21.6.8.AppImage
          sudo mv drawio-x86_64-21.6.8.AppImage /usr/local/bin/drawio

      - name: Create html_files directory
        run: mkdir -p html_files

      - name: Convert .drawio to HTML
        run: |
          xvfb-run --auto-servernum drawio -x -f html --crop -o "html_files/" ./**/*.drawio

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add html_files/*.html
          git commit -m "Auto-convert .drawio files to HTML" || echo "No changes to commit"
          git push
