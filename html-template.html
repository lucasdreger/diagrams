<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Draw.io Diagram</title>
  <style type="text/css">
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
    }
    .diagram-container {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 20px;
      margin: 0 auto;
      max-width: 95%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>%filename%</h1>
  <div class="diagram-container">%diagram%</div>
</body>
</html>
